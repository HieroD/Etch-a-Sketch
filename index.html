<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <h1>Etch-a-Sketch!</h1>
    <div id="container-mode">
        <div id="container-btn">
            <button id="paint-btn">Paint Mode</button>
            <button id="erase-btn">Eraser Mode</button>
            <button id="view-btn">View Mode</button>
        </div>
        <div id="container-input">
            <label for="grid">Grid count: </label>
            <input type="number" min="16" max="100" name="grid">
            <button id="apply-btn">Apply</button>
        </div>
    </div>
    <div id="container-grid"></div>
</body>
</html>
